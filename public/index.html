<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafka Sensor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Dashboard Capteur Température</h1>
        
        <div class="row">
            <!-- Graphique -->
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Évolution de la Température</h5>
                        <canvas id="tempChart" height="150"></canvas>
                    </div>
                </div>
            </div>

            <!-- Dernières Valeurs -->
            <div class="col-md-4">
                <div class="card shadow-sm border-primary mb-4">
                    <div class="card-body text-center">
                        <h5 class="card-title">Dernière Température</h5>
                        <h2 id="lastTemp" class="display-4 text-primary">--°C</h2>
                        <p id="lastUpdate" class="text-muted small"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tableau -->
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Historique des messages</h5>
                <table class="table table-striped mt-3">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Offset</th>
                            <th>Température</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('tempChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Température (°C)', data: [], borderColor: '#0d6efd', tension: 0.1 }] },
            options: { scales: { y: { beginAtZero: false } } }
        });

        async function fetchData() {
            try {
                const response = await fetch('/messages');
                const data = await response.json();
                
                if (data.length === 0) return;

                const lastMsg = data[0];
                document.getElementById('lastTemp').innerText = lastMsg.payload.temperature + "°C";
                document.getElementById('lastUpdate').innerText = "Reçu à : " + new Date(lastMsg.payload.createdAt).toLocaleTimeString();

                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = data.slice(0, 10).map(m => `
                    <tr>
                        <td>${m.id}</td>
                        <td>${m.message_offset}</td>
                        <td><strong>${m.payload.temperature}°C</strong></td>
                        <td>${new Date(m.payload.createdAt).toLocaleString()}</td>
                    </tr>
                `).join('');

                const chartData = [...data].reverse().slice(-20);
                chart.data.labels = chartData.map(m => new Date(m.payload.createdAt).toLocaleTimeString());
                chart.data.datasets[0].data = chartData.map(m => m.payload.temperature);
                chart.update('none');

            } catch (err) { console.error("Erreur fetch:", err); }
        }

        setInterval(fetchData, 2000);
        fetchData();
    </script>
</body>
</html>
